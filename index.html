            <h2 className="text-2xl font-bold mb-4">Spares Details (SMR Delivery Notes)</h2>
            <div className="grid grid-cols-4 gap-4 mb-4">
              <div className="bg-gray-800 p-4 rounded border border-gray-700">
                <p className="text-gray-400 text-sm">Total Items</p>
                <p className="text-2xl font-bold">{sparesStats.totalItems}</p>
              </div>
              <div className="bg-gray-800 p-4 rounded border border-gray-700">
                <p className="text-gray-400 text-sm">Total Amount</p>
                <p className="text-2xl font-bold text-green-400">₹{(sparesStats.totalAmount / 100000).toFixed(2)}L</p>
              </div>
              <div className="bg-gray-800 p-4 rounded border border-gray-700">
                <p className="text-gray-400 text-sm">Unique Customers</p>
                <p className="text-2xl font-bold">{sparesStats.uniqueCustomers}</p>
              </div>
              <div className="bg-gray-800 p-4 rounded border border-gray-700">
                <p className="text-gray-400 text-sm">Delivery Notes</p>
                <p className="text-2xl font-bold">{sparesStats.uniqueNotes}</p>
              </div>
            </div>
            <input
              type="text"
              placeholder="Filter by customer name..."
              value={searchSpares}
              onChange={(e) => setSearchSpares(e.target.value)}
              className="w-full mb-4 px-4 py-2 bg-gray-800 border border-gray-700 rounded text-white placeholder-gray-500"
            />
            <div className="overflow-x-auto">
              <table className="w-full border-collapse">
                <thead>
                  <tr className="bg-gray-800 border-b border-gray-700">
                    {["Delivery Note", "Customer", "Item", "Location", "Qty", "Amount (₹)", "Bot/Sherpa", "Status"].map((col) => (
                      <th key={col} className="px-4 py-3 text-left text-sm">
                        {col}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filteredSpares.map((row, idx) => (
                    <tr key={idx} className={`border-b border-gray-700 ${idx % 2 === 0 ? "bg-gray-800" : "bg-gray-750"} hover:bg-gray-700 transition text-sm`}>
                      <td className="px-4 py-3 font-mono text-xs">{row.id}</td>
                      <td className="px-4 py-3">{row.customer}</td>
                      <td className="px-4 py-3 max-w-xs truncate" title={row.item}>{row.item}</td>
                      <td className="px-4 py-3 text-gray-400 text-xs">{row.location}</td>
                      <td className="px-4 py-3">{row.qty}</td>
                      <td className="px-4 py-3 font-semibold text-green-400">₹{row.amount.toLocaleString()}</td>
                      <td className="px-4 py-3 text-gray-400 text-xs max-w-xs truncate" title={row.bot}>{row.bot}</td>
                      <td className="px-4 py-3"><span className={`px-2 py-1 rounded text-xs ${row.status === "Completed" ? "bg-green-900 text-green-200" : "bg-yellow-900 text-yellow-200"}`}>{row.status}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* Tab 4: Weekly CSM Update */}
        {activeTab === "csm" && (
          <div>
            <h2 className="text-2xl font-bold mb-4">Weekly CSM Update Sheet</h2>
            <div className="grid grid-cols-3 gap-4 mb-4">
              <div className="bg-gray-800 p-4 rounded border border-gray-700">
                <p className="text-gray-400 text-sm">Total AMRs Tracked</p>
                <p className="text-2xl font-bold">{csmStats.total}</p>
              </div>
              <div className="bg-gray-800 p-4 rounded border border-gray-700">
                <p className="text-gray-400 text-sm">With Updates</p>
                <p className="text-2xl font-bold text-yellow-400">{csmStats.withUpdates}</p>
              </div>
              <div className="bg-gray-800 p-4 rounded border border-gray-700">
                <p className="text-gray-400 text-sm">CSMs</p>
                <p className="text-2xl font-bold">{csmStats.csmCount}</p>
              </div>
            </div>
            <input
              type="text"
              placeholder="Search by CSM, customer, or location..."
              value={searchCsm}
              onChange={(e) => setSearchCsm(e.target.value)}
              className="w-full mb-4 px-4 py-2 bg-gray-800 border border-gray-700 rounded text-white placeholder-gray-500"
            />
            <div className="overflow-x-auto">
              <table className="w-full border-collapse">
                <thead>
                  <tr className="bg-gray-800 border-b border-gray-700">
                    <th className="px-4 py-3 text-left">CSM</th>
                    <th className="px-4 py-3 text-left">Customer</th>
                    <th className="px-4 py-3 text-left">Location</th>
                    <th className="px-4 py-3 text-left">AMR</th>
                    <th className="px-4 py-3 text-left">Update</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredCsm.map((row, idx) => (
                    <tr key={idx} className={`border-b border-gray-700 ${row.update && row.update.trim() ? "bg-yellow-900/30 border-l-4 border-l-yellow-500" : idx % 2 === 0 ? "bg-gray-800" : "bg-gray-750"} hover:bg-gray-700 transition`}>
                      <td className="px-4 py-3 font-semibold">{row.csm}</td>
                      <td className="px-4 py-3">{row.customer}</td>
                      <td className="px-4 py-3 text-gray-400">{row.location}</td>
                      <td className="px-4 py-3 font-mono text-sm">{row.amr}</td>
                      <td className={`px-4 py-3 text-sm whitespace-pre-wrap break-words max-w-xl ${row.update && row.update.trim() ? "text-yellow-200 font-medium" : "text-gray-500 italic"}`}>{row.update && row.update.trim() ? row.update : "No update"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* Tab 5: Jira Commissioning Tickets (Main Tickets Only) */}
        {activeTab === "jira" && (
          <div>
            <h2 className="text-2xl font-bold mb-4">Jira Commissioning Tickets (Main Tickets Only)</h2>
            <input
              type="text"
              placeholder="Search by key, title, or assignee..."
              value={searchJira}
              onChange={(e) => setSearchJira(e.target.value)}
              className="w-full mb-4 px-4 py-2 bg-gray-800 border border-gray-700 rounded text-white placeholder-gray-500"
            />

            {/* In Progress Section */}
            <h3 className="text-xl font-bold mt-6 mb-3 text-blue-400">In Progress ({inProgressTickets.length})</h3>
            <div className="overflow-x-auto mb-8">
              <table className="w-full border-collapse">
                <thead>
                  <tr className="bg-gray-800 border-b border-gray-700">
                    <th className="px-4 py-3 text-left">Key</th>
                    <th className="px-4 py-3 text-left">Title</th>
                    <th className="px-4 py-3 text-left">Status</th>
                    <th className="px-4 py-3 text-left">Assignee</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredJira
                    .filter(t => t.status === "In Progress")
                    .map((row, idx) => (
                      <tr key={idx} className={`border-b border-gray-700 ${idx % 2 === 0 ? "bg-gray-800" : "bg-gray-750"} hover:bg-gray-700 transition`}>
                        <td className="px-4 py-3 font-mono text-sm font-semibold text-blue-400">{row.key}</td>
                        <td className="px-4 py-3">{row.summary}</td>
                        <td className="px-4 py-3">
                          <span className="px-3 py-1 bg-yellow-900 text-yellow-100 rounded text-sm font-semibold">
                            {row.status}
                          </span>
                        </td>
                        <td className="px-4 py-3 text-gray-300">{row.assignee}</td>
                      </tr>
                    ))}
                </tbody>
              </table>
            </div>

            {/* To Do Section */}
            <h3 className="text-xl font-bold mt-6 mb-3 text-gray-300">To Do ({toDoTickets.length})</h3>
            <div className="overflow-x-auto">
              <table className="w-full border-collapse">
                <thead>
                  <tr className="bg-gray-800 border-b border-gray-700">
                    <th className="px-4 py-3 text-left">Key</th>
                    <th className="px-4 py-3 text-left">Title</th>
                    <th className="px-4 py-3 text-left">Status</th>
                    <th className="px-4 py-3 text-left">Assignee</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredJira
                    .filter(t => t.status === "To Do")
                    .map((row, idx) => (
                      <tr key={idx} className={`border-b border-gray-700 ${idx % 2 === 0 ? "bg-gray-800" : "bg-gray-750"} hover:bg-gray-700 transition`}>
                        <td className="px-4 py-3 font-mono text-sm font-semibold text-blue-400">{row.key}</td>
                        <td className="px-4 py-3">{row.summary}</td>
                        <td className="px-4 py-3">
                          <span className="px-3 py-1 bg-gray-700 text-gray-200 rounded text-sm font-semibold">
                            {row.status}
                          </span>
                        </td>
                        <td className="px-4 py-3 text-gray-300">{row.assignee}</td>
                      </tr>
                    ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById("root")).render(<AtiMotorsCSsDashboard />);
  </script>
</body>
</html>
